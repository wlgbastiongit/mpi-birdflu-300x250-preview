<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="ad.size" content="width=300,height=250">
<title>MPI Bird Flu Response - 300x250 (v2, Simple)</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 300px;
    height: 250px;
    overflow: hidden;
  }
  .banner {
    position: relative;
    width: 300px;
    height: 250px;
    cursor: pointer;
  }
  .frame {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 250px;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  .frame.active {
    opacity: 1;
  }
  .frame img.bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 250px;
    display: block;
  }
  .el {
    position: absolute;
    display: block;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
  /* text elements: no independent motion - they fade in/out purely via the frame's own opacity transition */
  .static-el {
    position: absolute;
    display: block;
    opacity: 1;
  }

  /* --- shared stripe: static, sits above every frame --- */
  .stripe-wrap {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 12px;
    z-index: 5;
  }
  .stripe-wrap img {
    position: absolute;
    top: 0;
    left: 0;
    width: 300px;
    height: 12px;
  }

  /* --- element placement --- */
  .birds    { left: 43.33px; top: 93.33px; width: 256.67px; height: 170px; }
  .headline { left: 7.33px;  top: 22px;    width: 229.33px; height: 97px; transform-origin: left center; }
  .text2    { left: 10.33px; top: 68.33px; width: 197.67px; height: 89.33px; }
  .text3    { left: 9.67px;  top: 68.33px; width: 231.67px; height: 94px; }
  .text4    { left: 11px;    top: 68.33px; width: 220.33px; height: 64px; }
  .card     { left: 82.21px; top: 44.65px; width: 135.59px; height: 131.68px; }
  .cta      { left: 89.84px; top: 172px;   width: 120.33px; height: 30px; }
  .govtnz   { left: 222.67px;top: 212px;   width: 62px;     height: 23px; }

  /* --- keyframes ---
     transform only: opacity is handled separately below by a plain transition, so
     fade-in/out is always reliable regardless of whether an entrance animation is
     running (an animation being removed does not reliably hand off to a transition). */
  @keyframes riseUp {
    from { transform: translateY(450px); }
    to   { transform: translateY(0); }
  }
  @keyframes fadeRiseIn {
    from { transform: translateY(20px); }
    to   { transform: translateY(0); }
  }
  @keyframes expandIn {
    from { transform: scale(0); }
    to   { transform: scale(1); }
  }

  /* --- per-frame entrance timing ---
     each rule sets its own transition duration/delay (for the opacity fade-in) alongside
     a matching animation (for the transform). On exit, none of these rules match any more,
     so opacity simply falls back to the base .el transition (1s, no delay) - a plain,
     always-reliable fade out in sync with the frame. */

  /* frame 1: birds rise from beneath the frame and land first; headline only
     starts growing from nothing once the birds have fully settled into place */
  .frame.active .birds {
    opacity: 1;
    transition: opacity 1.6s ease-in-out;
    animation: riseUp 1.6s cubic-bezier(.4,0,.2,1);
  }
  .frame.active .headline {
    opacity: 1;
    transition: opacity 1.1s ease-in-out 1.75s;
    animation: expandIn 1.1s ease-out 1.75s;
  }

  /* frames 2-4 text: no element-level animation - plain fade in/out via the frame's own opacity transition */

  /* frame 5 (end card): the bird flu logo fades/rises in first and lingers on its own,
     then the CTA and GOVT.NZ logo come in together well after (matches the OG poultry banner sequencing) */
  .frame.active .card {
    opacity: 1;
    transition: opacity 0.8s ease-in-out 0.15s;
    animation: fadeRiseIn 0.8s ease-out 0.15s;
  }
  .frame.active .cta,
  .frame.active .govtnz {
    opacity: 1;
    transition: opacity 0.7s ease-in-out 1.8s;
    animation: fadeRiseIn 0.7s ease-out 1.8s;
  }

  .clickthrough {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="banner" id="banner">

    <div class="frame" id="frame1">
      <img class="bg" src="images/bg-frame1.jpg" alt="">
      <img class="el birds" src="images/birds.webp" alt="">
      <img class="el headline" src="images/el-frame1_headline.png" alt="Don't let bird flu take flight">
    </div>

    <div class="frame" id="frame2">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el text2" src="images/el-frame2_text.png" alt="Bird flu has been detected in New Zealand">
    </div>

    <div class="frame" id="frame3">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el text3" src="images/el-frame3_text.png" alt="It isn't widespread yet and hasn't been found in poultry">
    </div>

    <div class="frame" id="frame4">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="static-el text4" src="images/el-frame4_text.png" alt="However it's likely here to stay">
    </div>

    <div class="frame" id="frame5">
      <img class="bg" src="images/bg-feather.jpg" alt="">
      <img class="el card" src="images/el-frame5_card.png" alt="Bird flu, know what to do">
      <img class="el cta" src="images/el-frame5_cta.png" alt="Find out more">
      <img class="el govtnz" src="images/govtnz-lockup.png" alt="GOVT.NZ">
    </div>

    <div class="stripe-wrap">
      <img src="images/el-stripe.png" alt="">
    </div>

    <a class="clickthrough" id="clickthrough" href="#REPLACE_CLICK_URL" target="_blank" rel="noopener"></a>
  </div>

  <script>
    // Ad-server clickTag convention. Replace with the real destination URL before trafficking.
    var clickTag = "#REPLACE_CLICK_URL";
    document.getElementById("clickthrough").addEventListener("click", function (e) {
      e.preventDefault();
      window.open(clickTag, "_blank");
    });

    var frames = [
      document.getElementById("frame1"),
      document.getElementById("frame2"),
      document.getElementById("frame3"),
      document.getElementById("frame4"),
      document.getElementById("frame5")
    ];
    var durations = [4200, 4700, 5200, 4600, 5000]; // ms each frame is shown
    var maxLoops = 2; // full sequence repeats, then holds on the end card
    var index = 0;
    var loopCount = 0;

    function showFrame(i) {
      frames.forEach(function (f, idx) {
        f.classList.toggle("active", idx === i);
      });
    }

    function advance() {
      var next = index + 1;

      if (next >= frames.length) {
        loopCount++;
        if (loopCount >= maxLoops) {
          // Stay on the end card (last frame) permanently.
          return;
        }
        next = 0;
      }

      index = next;
      showFrame(index);
      setTimeout(advance, durations[index]);
    }

    // Frame 1 starts out inactive (opacity 0, per .frame's base style) so that
    // activating it here is a genuine state change - required for its entrance
    // transition/animation to actually play. A double rAF lets the browser paint
    // the inactive state first; without it, the very first activation can get
    // coalesced with the initial render and the entrance skips straight to its
    // end state (looked like "the text is already there" on first load, only
    // animating properly from the second loop onward).
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        showFrame(0);
        setTimeout(advance, durations[0]);
      });
    });
  </script>
</body>
</html>
